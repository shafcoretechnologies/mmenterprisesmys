  <body>
    <div class="cursor" id="c"></div>
    <div class="cursor-ring" id="cr"></div>
    <div class="progress-bar" id="pb"></div>

    <nav id="nav">
      <a class="nav-logo" href="#top">

        <div class="nav-brand" data-html="brand.nameHtml"></div>

      <span data-text="wa.label"></span>

    <section class="hero" id="top">
      <div class="hero-grid-lines"></div>
      <div class="hero-glow"></div>
      <div class="hero-glow2"></div>

      <div class="hero-inner">
        <div>
          <div class="hero-eyebrow fade">
            <div class="eyebrow-line"></div>
            <span class="eyebrow-text" data-text="hero.eyebrow"></span>
          </div>
          <h1 class="hero-h1 fade" data-html="hero.titleHtml"></h1>
          <p class="hero-sub-h fade" data-text="hero.subtitle"></p>
          <p class="hero-desc fade" data-text="hero.description"></p>
          <div class="hero-actions fade" id="hero-actions"></div>
          <div class="hero-stats fade" id="hero-stats"></div>
        </div>

        <div class="hero-right">
          <img class="hero-img-main" id="hero-image" src="" alt="" />
          <div class="hero-card-float" id="hero-card">
            <div class="cf-num" data-text="hero.card.value"></div>
            <div class="cf-label" data-html="hero.card.labelHtml"></div>
          </div>
          <div class="hero-badge-float" id="hero-badge">
            <div data-text="hero.badge.icon"></div>
            <div class="hero-badge-title" data-text="hero.badge.title"></div>
            <div class="hero-badge-sub" data-text="hero.badge.subtitle"></div>
          </div>
        </div>
      </div>
    </section>

    <div class="ticker">
      <div class="ticker-inner" id="ticker-inner"></div>
    </div>

    <section id="products" class="products-bg">
      <div class="sec-inner">
        <div class="fade">
          <div class="sec-eyebrow">
            <div class="sec-eyebrow-line"></div>
            <span class="sec-eyebrow-text" data-text="products.eyebrow"></span>
          </div>
          <h2 class="sec-title" data-html="products.titleHtml"></h2>
          <p class="sec-sub" data-text="products.subtitle"></p>
        </div>

        <div class="products-grid" id="products-grid"></div>
      </div>
    </section>

    <section class="why-bg">
      <div class="sec-inner">
        <div class="fade section-center">
          <div class="sec-eyebrow sec-eyebrow-center">
            <div class="sec-eyebrow-line"></div>
            <span class="sec-eyebrow-text" data-text="why.eyebrow"></span>
          </div>
          <h2 class="sec-title sec-title-light" data-text="why.title"></h2>
        </div>
        <div class="why-grid" id="why-grid"></div>
      </div>
    </section>

    <section id="about">
      <div class="sec-inner">
        <div class="about-grid">
          <div class="about-img-wrap fade">
            <div class="about-img-stack">
              <img class="about-img-main" id="about-image-main" src="" alt="" />
              <img class="about-img-accent" id="about-image-accent" src="" alt="" />
              <div class="about-year-badge">
                <div class="year" data-text="about.badge.year"></div>
                <div class="since" data-text="about.badge.label"></div>
              </div>
            </div>
          </div>

          <div>
            <div class="sec-eyebrow fade">
              <div class="sec-eyebrow-line"></div>
              <span class="sec-eyebrow-text" data-text="about.eyebrow"></span>
            </div>
            <h2 class="sec-title fade" data-text="about.title"></h2>
            <div id="about-text" class="about-text-wrap"></div>

            <ul class="about-list fade" id="about-list"></ul>

            <div class="about-facts fade" id="about-facts"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="clients" class="clients-bg">
      <div class="sec-inner">
        <div class="fade">
          <div class="sec-eyebrow">
            <div class="sec-eyebrow-line"></div>
            <span class="sec-eyebrow-text" data-text="clients.eyebrow"></span>
          </div>
          <h2 class="sec-title" data-html="clients.titleHtml"></h2>
          <p class="sec-sub" data-text="clients.subtitle"></p>
        </div>
        <div class="clients-badges fade" id="clients-badges"></div>
      </div>
    </section>

    <section id="testimonials" class="section-white">
      <div class="sec-inner">
        <div class="fade">
          <div class="sec-eyebrow">
            <div class="sec-eyebrow-line"></div>
            <span class="sec-eyebrow-text" data-text="testimonials.eyebrow"></span>
          </div>
          <h2 class="sec-title" data-html="testimonials.titleHtml"></h2>
        </div>
        <div class="testi-grid" id="testi-grid"></div>
      </div>
    </section>

    <section class="cta-section">
      <div class="sec-inner section-center">
        <div class="fade">
          <div class="sec-eyebrow sec-eyebrow-center">
            <div class="sec-eyebrow-line sec-eyebrow-line-soft"></div>
            <span class="sec-eyebrow-text" data-text="cta.eyebrow"></span>
          </div>
        </div>
        <h2 class="cta-title fade" data-html="cta.titleHtml"></h2>
        <p class="cta-sub fade" data-text="cta.subtitle"></p>
        <div class="cta-actions fade" id="cta-actions"></div>
        <p class="cta-trust fade" data-text="cta.trust"></p>
      </div>
    </section>

    <section id="contact" class="section-cream">
      <div class="sec-inner">
        <div class="fade">
          <div class="sec-eyebrow">
            <div class="sec-eyebrow-line"></div>
            <span class="sec-eyebrow-text" data-text="contact.eyebrow"></span>
          </div>
          <h2 class="sec-title" data-text="contact.title"></h2>
        </div>
        <div class="contact-grid">
          <div>
            <div class="contact-info-list fade" id="contact-list"></div>

            <div class="map-wrap fade">
              <iframe
                id="contact-map"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                src=""
                title="MM Enterprises location"
              ></iframe>
            </div>
            <a
              id="contact-directions"
              href="#"
              target="_blank"
              rel="noopener"
              class="map-link"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
                <circle cx="12" cy="10" r="3" />
              </svg>
              <span data-text="contact.map.directionsLabel"></span>
            </a>
          </div>

          <div class="contact-form fade">
            <div class="form-title" data-text="contact.form.title"></div>
            <div class="form-sub" data-text="contact.form.subtitle"></div>
            <form id="enquiry-form">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" data-text="contact.form.nameLabel"></label>
                  <input
                    class="form-input"
                    type="text"
                    data-placeholder="contact.form.namePlaceholder"
                    required
                  />
                </div>
                <div class="form-group">
                  <label class="form-label" data-text="contact.form.phoneLabel"></label>
                  <input
                    class="form-input"
                    type="tel"
                    data-placeholder="contact.form.phonePlaceholder"
                    required
                  />
                </div>
              </div>
              <div class="form-group form-group-tight">
                <label class="form-label" data-text="contact.form.schoolLabel"></label>
                <input
                  class="form-input"
                  type="text"
                  data-placeholder="contact.form.schoolPlaceholder"
                />
              </div>
              <div class="form-group form-group-tight">
                <label class="form-label" data-text="contact.form.productLabel"></label>
                <select class="form-select" id="product-select"></select>
              </div>
              <div class="form-group form-group-tight">
                <label class="form-label" data-text="contact.form.messageLabel"></label>
                <textarea
                  class="form-textarea"
                  data-placeholder="contact.form.messagePlaceholder"
                ></textarea>
              </div>
              <button type="submit" class="form-btn" data-text="contact.form.submitLabel"></button>
              <p class="form-footnote">
                <span data-text="contact.form.whatsappPrefix"></span>
                <a id="form-whatsapp" href="#" target="_blank" rel="noopener" class="form-whatsapp"></a>
              </p>
            </form>
            <div id="form-ok"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="seo-section">
      <div class="sec-inner">
        <p class="seo-text" data-text="seo.paragraph"></p>
      </div>
    </section>

    <footer>
      <div class="footer-top">
        <div>
          <div class="footer-logo-row">
            <div class="nav-logo-mark" data-text="brand.mark"></div>
            <span class="footer-brand" data-html="brand.nameHtml"></span>
          </div>
          <p class="footer-desc" data-text="footer.description"></p>
          <div class="footer-gold-line"></div>
        </div>
        <div class="footer-columns" id="footer-columns"></div>
      </div>
      <div class="footer-bottom">
        <span data-text="footer.bottomLeft"></span>
        <span data-html="footer.bottomRightHtml"></span>
      </div>
    </footer>

    <template id="nav-link-template">
      <li><a href="#"></a></li>
    </template>

    <template id="hero-action-template">
      <a class="btn-gold" href="#" target="_blank" rel="noopener"></a>
    </template>

    <template id="hero-stat-template">
      <div>
        <div class="hero-stat-num"></div>
        <div class="hero-stat-label"></div>
      </div>
    </template>

    <template id="ticker-item-template">
      <div class="ticker-item">Item <span class="ticker-dot"></span></div>
    </template>

    <template id="product-card-template">
      <div class="product-card fade">
        <div class="product-img-wrap">
          <img class="product-img" src="" alt="" />
          <div class="product-special" hidden>
            <div class="product-special-inner">
              <div class="product-special-mark">?</div>
              <p class="product-special-text"></p>
            </div>
          </div>
          <span class="product-cat-badge"></span>
        </div>
        <div class="product-body">
          <h3 class="product-name"></h3>
          <p class="product-desc"></p>
          <div class="product-tags"></div>
          <a class="product-enquire" href="#" target="_blank" rel="noopener">
            <span class="product-enquire-label"></span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6" />
            </svg>
          </a>
        </div>
      </div>
    </template>

    <template id="product-tag-template">
      <span class="product-tag"></span>
    </template>

    <template id="why-card-template">
      <div class="why-card fade">
        <div class="why-icon"></div>
        <div class="why-title"></div>
        <div class="why-text"></div>
      </div>
    </template>

    <template id="about-text-template">
      <p class="about-text fade"></p>
    </template>

    <template id="about-list-template">
      <li>
        <div class="about-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </div>
        <span></span>
      </li>
    </template>

    <template id="about-fact-template">
      <div class="about-fact">
        <div class="about-fact-num"></div>
        <div class="about-fact-label"></div>
      </div>
    </template>

    <template id="client-badge-template">
      <div class="client-badge">
        <span class="client-icon"></span>
        <span class="client-label"></span>
      </div>
    </template>

    <template id="testi-card-template">
      <div class="testi-card fade">
        <div class="testi-stars"></div>
        <p class="testi-quote"></p>
        <div class="testi-author">
          <div class="testi-avatar"></div>
          <div>
            <div class="testi-name"></div>
            <div class="testi-role"></div>
          </div>
        </div>
      </div>
    </template>

    <template id="cta-action-template">
      <a class="btn-gold" href="#" target="_blank" rel="noopener"></a>
    </template>

    <template id="contact-item-template">
      <div class="contact-item">
        <div class="contact-icon-wrap"></div>
        <div>
          <div class="contact-label"></div>
          <div class="contact-value"></div>
        </div>
      </div>
    </template>

    <template id="footer-column-template">
      <div class="footer-col">
        <h4></h4>
        <div class="footer-links"></div>
      </div>
    </template>

    <template id="footer-link-template">
      <a href="#"></a>
    </template>

    <script src="script.js" defer></script>
  </body>
